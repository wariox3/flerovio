name: Release

# Se dispara al hacer push de un tag tipo v0.2.0.
# Construye el instalador en Windows y crea/actualiza el release en GitHub.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # necesario para crear el release

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sincronizar versión desde el tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Versión: $version"

          (Get-Content src/flerovio/__init__.py) `
            -replace '__version__ = ".*"', "__version__ = `"$version`"" `
            | Set-Content src/flerovio/__init__.py

          (Get-Content packaging/windows/flerovio.iss) `
            -replace '#define AppVersion ".*"', "#define AppVersion `"$version`"" `
            | Set-Content packaging/windows/flerovio.iss

      - name: Correr tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Lint
        run: ruff check .

      - name: PyInstaller
        run: pyinstaller packaging/windows/flerovio.spec --noconfirm

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y
        shell: cmd

      - name: Construir instalador
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\flerovio.iss'

      - name: Listar artefactos
        shell: pwsh
        run: Get-ChildItem packaging\windows\Output

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: instalador-windows
          path: packaging/windows/Output/*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Crear release de GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Flerovio ${{ github.ref_name }}
          files: packaging/windows/Output/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
